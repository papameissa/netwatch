name: 🐳 Build & Push Docker Hub

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  IMAGE_NAME: netwatch

jobs:

  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Vérification syntaxe Python
        run: |
          pip install pyflakes
          # On vérifie uniquement les erreurs graves (syntaxe), pas les imports inutilisés
          pyflakes app/ 2>&1 | grep -v "imported but unused" | grep -v "redefinition of unused" || true
          echo "✅ Syntaxe OK"

      - name: Vérification imports
        run: |
          pip install flask flask-sqlalchemy flask-login flask-wtf flask-socketio eventlet
          python -c "
          import os
          os.environ['DATABASE_URL'] = 'sqlite:///test.db'
          os.environ['SECRET_KEY']   = 'test'
          from app.models import User, Equipement, PingHistory, Alerte
          print('✅ Imports OK')
          "

  build-and-push:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: 🔑 Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Tags de l'image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=raw,value={{date 'YYYY-MM-DD'}}

      - name: ⚙️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🚀 Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: 📋 Résumé
        run: |
          echo "## ✅ Déploiement réussi" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tags** | \`latest\` · \`sha-...\` · \`$(date +%Y-%m-%d)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
