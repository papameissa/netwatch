{% extends "base.html" %}
{% block title %}Nouvel utilisateur{% endblock %}
{% block page_title %}Administration{% endblock %}
{% block content %}
<div style="max-width:480px">
  <div style="margin-bottom:20px">
    <a href="/admin" class="btn btn-ghost btn-sm">← Retour</a>
  </div>
  <div style="margin-bottom:20px">
    <div class="page-heading">Nouvel utilisateur</div>
    <div class="page-desc">Créer un accès opérateur ou administrateur</div>
  </div>
  <div class="card">
    <div class="card-body">
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="form-group">
          <label class="form-label">Nom d'utilisateur <span>*</span></label>
          <input class="form-control" type="text" name="username" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe <span>*</span></label>
          <input class="form-control" type="password" name="password" required>
        </div>
        <div class="form-group">
          <label class="form-label">Rôle</label>
          <select class="form-control" name="role">
            <option value="operateur">Opérateur — lecture seule</option>
            <option value="admin">Administrateur — accès total</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Créer</button>
          <a href="/admin" class="btn btn-ghost">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
